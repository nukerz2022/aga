kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[[services]]
localPort = 3000
name = "Discord Bot"
paths = ["/bot"]

[services.development]
run = "node /home/runner/workspace/artifacts/discord-bot/src/index.js"

[services.development.env]
PORT = "3000"

[services.production]

[services.production.run]
args = ["node", "/home/runner/workspace/artifacts/discord-bot/src/index.js"]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/bot/health"
